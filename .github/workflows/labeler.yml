# PR Labeler Pipeline
#
# Automatically labels pull requests based on file paths and size.
# Copy .github/labeler.yml to your repository to configure labels.
#
# Usage:
#   jobs:
#     label:
#       uses: sebastienrousseau/pipelines/.github/workflows/labeler.yml@main

name: PR Labeler

on:
  workflow_call:
    inputs:
      config-path:
        description: 'Path to labeler config'
        default: '.github/labeler.yml'
        type: string

permissions: {}

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          configuration-path: ${{ inputs.config-path }}
          sync-labels: true

      - uses: codelytv/pr-size-labeler@4ec67706cd878fbc1c8db0a5dcd28b6bb412e85a # v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 500
          l_label: 'size/l'
          l_max_size: 1000
          xl_label: 'size/xl'
          fail_if_xl: false
