name: Release

on:
  workflow_call:
    inputs:
      language:
        description: 'Project language (rust, python, node, go)'
        required: true
        type: string
      dry-run:
        description: 'Perform a dry run without publishing'
        default: false
        type: boolean
      rust-targets:
        description: 'JSON array of {target, os} for cross-compilation (Rust only)'
        default: '[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"}]'
        type: string
      go-targets:
        description: 'JSON array of {goos, goarch, os} for cross-compilation (Go only)'
        default: '[{"goos":"linux","goarch":"amd64","os":"ubuntu-latest"}]'
        type: string
    secrets:
      CRATES_TOKEN:
        description: 'crates.io API token (fallback if Trusted Publishing not configured)'
        required: false
      PYPI_TOKEN:
        description: 'PyPI API token (fallback if Trusted Publishing not configured)'
        required: false
      NPM_TOKEN:
        description: 'npm API token'
        required: false

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # ─── Rust ──────────────────────────────────────────────────────────
  build-rust:
    name: Build (${{ matrix.platform.target }})
    if: inputs.language == 'rust'
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        platform: ${{ fromJson(inputs.rust-targets) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.platform.target }}
          save-if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p target/package
          tar czf target/package/${{ matrix.platform.target }}.tar.gz -C target/${{ matrix.platform.target }}/release .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.platform.target }}.tar.gz
          path: target/package/${{ matrix.platform.target }}.tar.gz
          retention-days: 1

  release-rust:
    name: Release Rust
    if: inputs.language == 'rust'
    needs: build-rust
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Get version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | jq -r '.packages[0].version' 2>/dev/null || grep '^version' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: true
          files: artifacts/**/*.tar.gz

      - name: Attest build provenance
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'artifacts/**/*.tar.gz'

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM to release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.version.outputs.version }}" sbom.spdx.json --clobber

      - name: Install Rust toolchain
        if: ${{ !inputs.dry-run }}
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish to crates.io
        if: ${{ !inputs.dry-run }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  # ─── Python ────────────────────────────────────────────────────────
  release-python:
    name: Release Python
    runs-on: ubuntu-latest
    if: inputs.language == 'python'
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install & build
        run: |
          pip install --no-cache-dir poetry
          poetry install
          poetry run pytest
          poetry build

      - name: Get version
        id: version
        run: echo "version=$(poetry version -s)" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*

      - name: Attest build provenance
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'dist/*'

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Publish to PyPI (OIDC Trusted Publishing)
        if: ${{ !inputs.dry-run }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1
        with:
          # Uses OIDC when Trusted Publishing is configured on PyPI.
          # Falls back to token if not configured.
          password: ${{ secrets.PYPI_TOKEN || '' }}

  # ─── Node.js ───────────────────────────────────────────────────────
  release-node:
    name: Release Node
    runs-on: ubuntu-latest
    if: inputs.language == 'node'
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 9

      - name: Install, test & build
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      - name: Attest build provenance
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'package.json'

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: pnpm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Go ────────────────────────────────────────────────────────────
  build-go:
    name: Build (${{ matrix.platform.goos }}/${{ matrix.platform.goarch }})
    if: inputs.language == 'go'
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        platform: ${{ fromJson(inputs.go-targets) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Build
        env:
          GOOS: ${{ matrix.platform.goos }}
          GOARCH: ${{ matrix.platform.goarch }}
          CGO_ENABLED: '0'
        run: |
          OUTPUT_NAME="${{ github.event.repository.name }}-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}"
          go build -trimpath -ldflags="-s -w" -o "${OUTPUT_NAME}" .
          tar czf "${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}.tar.gz
          path: '*.tar.gz'
          retention-days: 1

  release-go:
    name: Release Go
    if: inputs.language == 'go'
    needs: build-go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

      - name: Attest build provenance
        if: ${{ !inputs.dry-run }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'artifacts/**/*.tar.gz'

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM to release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.version.outputs.version }}" sbom.spdx.json --clobber
