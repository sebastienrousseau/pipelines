name: Documentation

on:
  workflow_call:
    inputs:
      type:
        description: 'Documentation type (rust, python-mkdocs, python-sphinx, static)'
        required: true
        type: string
      deploy:
        description: 'Deploy to GitHub Pages'
        default: true
        type: boolean
      working-directory:
        description: 'Working directory'
        default: '.'
        type: string
      output-directory:
        description: 'Output directory for built docs'
        default: ''
        type: string
      python-version:
        description: 'Python version (for Python docs)'
        default: '3.12'
        type: string
      rust-version:
        description: 'Rust toolchain version'
        default: 'nightly'
        type: string
      cname:
        description: 'Custom domain for GitHub Pages'
        default: ''
        type: string
      redirect-crate:
        description: 'Crate name for index.html redirect (Rust only)'
        default: ''
        type: string

permissions: {}

jobs:
  build-rust:
    name: Build Rust Docs
    runs-on: ubuntu-latest
    if: inputs.type == 'rust'
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust-version }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: docs
          save-if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build documentation
        working-directory: ${{ inputs.working-directory }}
        run: |
          RUSTDOCFLAGS="--cfg docsrs" cargo doc --no-deps --all-features --workspace
          if [ -n "${{ inputs.redirect-crate }}" ]; then
            echo '<html><head><meta http-equiv="refresh" content="0; url=/${{ inputs.redirect-crate }}/"></head><body></body></html>' > target/doc/index.html
          fi
          if [ -n "${{ inputs.cname }}" ]; then
            echo '${{ inputs.cname }}' > target/doc/CNAME
          fi

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ inputs.working-directory }}/target/doc

  build-mkdocs:
    name: Build MkDocs
    runs-on: ubuntu-latest
    if: inputs.type == 'python-mkdocs'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install & build
        working-directory: ${{ inputs.working-directory }}
        run: |
          pip install --no-cache-dir mkdocs mkdocs-material mkdocstrings[python]
          [ -f requirements-docs.txt ] && pip install --no-cache-dir -r requirements-docs.txt
          mkdocs build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ inputs.working-directory }}/site

  build-sphinx:
    name: Build Sphinx
    runs-on: ubuntu-latest
    if: inputs.type == 'python-sphinx'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install & build
        working-directory: ${{ inputs.working-directory }}
        run: |
          pip install --no-cache-dir sphinx sphinx-rtd-theme
          [ -f requirements-docs.txt ] && pip install --no-cache-dir -r requirements-docs.txt
          [ -f docs/requirements.txt ] && pip install --no-cache-dir -r docs/requirements.txt
          cd docs && make html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ inputs.working-directory }}/docs/_build/html

  build-static:
    name: Build Static
    runs-on: ubuntu-latest
    if: inputs.type == 'static'
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ inputs.output-directory || inputs.working-directory }}

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-rust, build-mkdocs, build-sphinx, build-static]
    if: |
      always() &&
      inputs.deploy &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      (needs.build-rust.result == 'success' ||
       needs.build-mkdocs.result == 'success' ||
       needs.build-sphinx.result == 'success' ||
       needs.build-static.result == 'success')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
