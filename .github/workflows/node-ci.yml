# Node.js / TypeScript CI Pipeline
#
# Reusable workflow for Node.js/TypeScript projects.
# Single consolidated job: lint, type check, test, build.
#
# Usage:
#   jobs:
#     ci:
#       uses: sebastienrousseau/pipelines/.github/workflows/node-ci.yml@main
#       with:
#         node-version: '22'

name: Node.js CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        default: '22'
        type: string
      package-manager:
        description: 'Package manager (npm, pnpm, yarn)'
        default: 'pnpm'
        type: string
      working-directory:
        description: 'Working directory'
        default: '.'
        type: string
      run-lint:
        description: 'Run linting'
        default: true
        type: boolean
      run-typecheck:
        description: 'Run type checking'
        default: true
        type: boolean
      run-tests:
        description: 'Run tests'
        default: true
        type: boolean
      run-build:
        description: 'Run build'
        default: true
        type: boolean
      test-coverage:
        description: 'Generate test coverage'
        default: false
        type: boolean
      runner:
        description: 'Runner label (e.g. ubuntu-latest, ubuntu-24.04-arm)'
        default: 'ubuntu-latest'
        type: string
      timeout-minutes:
        description: 'Timeout for the CI job'
        default: 15
        type: number
    secrets:
      CODECOV_TOKEN:
        description: 'Codecov upload token'
        required: false

permissions: {}

env:
  CI: true
  NODE_OPTIONS: '--max-old-space-size=2048'

jobs:
  ci:
    name: CI
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *)    npm ci ;;
          esac

      - name: Lint
        if: inputs.run-lint
        working-directory: ${{ inputs.working-directory }}
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm lint ;;
            yarn) yarn lint ;;
            *)    npm run lint ;;
          esac

      - name: Type check
        if: inputs.run-typecheck
        working-directory: ${{ inputs.working-directory }}
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm typecheck || pnpm tsc --noEmit ;;
            yarn) yarn typecheck || yarn tsc --noEmit ;;
            *)    npm run typecheck || npx tsc --noEmit ;;
          esac

      - name: Test
        if: inputs.run-tests
        working-directory: ${{ inputs.working-directory }}
        run: |
          ARGS=""
          [ "${{ inputs.test-coverage }}" = "true" ] && ARGS="--coverage"
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm test $ARGS ;;
            yarn) yarn test $ARGS ;;
            *)    npm test -- $ARGS ;;
          esac

      - name: Upload coverage
        if: inputs.test-coverage && inputs.run-tests
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ inputs.working-directory }}/coverage

      - name: Build
        if: inputs.run-build
        working-directory: ${{ inputs.working-directory }}
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm build ;;
            yarn) yarn build ;;
            *)    npm run build ;;
          esac

      - name: Upload build artifacts
        if: inputs.run-build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build
          path: |
            ${{ inputs.working-directory }}/dist
            ${{ inputs.working-directory }}/build
          if-no-files-found: ignore
          retention-days: 3
