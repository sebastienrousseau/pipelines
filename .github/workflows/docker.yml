# Docker Build and Push Pipeline
#
# Reusable workflow for building and pushing Docker images.
# Includes Sigstore signing and SLSA attestations.
#
# Usage:
#   jobs:
#     docker:
#       uses: sebastienrousseau/pipelines/.github/workflows/docker.yml@main
#       with:
#         image-name: my-app

name: Docker

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        default: 'Dockerfile'
        type: string
      context:
        description: 'Build context'
        default: '.'
        type: string
      platforms:
        description: 'Target platforms (comma-separated)'
        default: 'linux/amd64,linux/arm64'
        type: string
      push:
        description: 'Push image to registry'
        default: true
        type: boolean
      registry:
        description: 'Container registry (docker.io, ghcr.io)'
        default: 'ghcr.io'
        type: string
      cache-from:
        description: 'Cache source'
        default: 'type=gha'
        type: string
      cache-to:
        description: 'Cache destination'
        default: 'type=gha,mode=max'
        type: string
      build-args:
        description: 'Build arguments (newline-separated)'
        default: ''
        type: string
    secrets:
      DOCKER_USERNAME:
        description: 'Docker Hub username'
        required: false
      DOCKER_PASSWORD:
        description: 'Docker Hub password/token'
        required: false
    outputs:
      image:
        description: 'Full image reference'
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}

permissions: {}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: inputs.registry == 'docker.io' && inputs.push
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: inputs.registry == 'ghcr.io' && inputs.push
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ inputs.cache-from }}
          cache-to: ${{ inputs.cache-to }}
          build-args: ${{ inputs.build-args }}

      - name: Install cosign
        if: inputs.push
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign container image
        if: inputs.push
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && images+=("${tag}@${DIGEST}")
          done <<< "$TAGS"
          cosign sign --yes "${images[@]}"

      - name: Attest container provenance
        if: inputs.push
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: inputs.push
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.meta.outputs.tags }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        if: inputs.push
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 7

      - name: Trivy vulnerability scan
        if: inputs.push
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: inputs.push
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
