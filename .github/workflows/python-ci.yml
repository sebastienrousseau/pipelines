name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Primary Python version'
        default: '3.12'
        type: string
      python-versions:
        description: 'JSON array of versions for matrix testing'
        default: '["3.11", "3.12"]'
        type: string
      run-mypy:
        description: 'Run type checking'
        default: true
        type: boolean
      run-ruff:
        description: 'Run ruff linting'
        default: true
        type: boolean
      run-coverage:
        description: 'Generate coverage report'
        default: false
        type: boolean
      coverage-threshold:
        description: 'Minimum coverage percentage'
        default: 80
        type: number
      package-manager:
        description: 'Package manager (poetry, pip, uv)'
        default: 'uv'
        type: string
      runner:
        description: 'Runner label (e.g. ubuntu-latest, ubuntu-24.04-arm)'
        default: 'ubuntu-latest'
        type: string
      timeout-minutes:
        description: 'Timeout for jobs'
        default: 15
        type: number
    secrets:
      CODECOV_TOKEN:
        description: 'Codecov upload token'
        required: false

permissions: {}

jobs:
  check:
    name: Check
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        if: inputs.package-manager == 'uv'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      # Ruff runs BEFORE deps — it only needs source files, fail-fast on lint
      - name: Ruff check
        if: inputs.run-ruff
        run: |
          case "${{ inputs.package-manager }}" in
            uv) uvx ruff check . ;;
            *)  pip install --no-cache-dir ruff && ruff check . ;;
          esac

      - name: Ruff format
        if: inputs.run-ruff
        run: |
          case "${{ inputs.package-manager }}" in
            uv) uvx ruff format --check . ;;
            *)  ruff format --check . ;;
          esac

      # Deps only needed for mypy
      - name: Install dependencies
        if: inputs.run-mypy
        run: |
          case "${{ inputs.package-manager }}" in
            poetry)
              pip install --no-cache-dir poetry
              poetry install
              ;;
            uv)
              uv sync --dev
              ;;
            *)
              pip install --no-cache-dir -e ".[dev]"
              ;;
          esac

      - name: Mypy
        if: inputs.run-mypy
        run: |
          case "${{ inputs.package-manager }}" in
            poetry) poetry run mypy src/ || poetry run mypy . ;;
            uv)     uv run mypy src/ || uv run mypy . ;;
            *)      pip install --no-cache-dir mypy && (mypy src/ || mypy .) ;;
          esac

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: check
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        if: inputs.package-manager == 'uv'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install dependencies
        run: |
          case "${{ inputs.package-manager }}" in
            poetry)
              pip install --no-cache-dir poetry
              poetry install
              ;;
            uv)
              uv sync --dev
              ;;
            *)
              pip install --no-cache-dir -e ".[dev]"
              ;;
          esac

      - name: Test
        run: |
          COV_ARGS=""
          if [ "${{ inputs.run-coverage }}" = "true" ] && [ "${{ matrix.python-version }}" = "${{ inputs.python-version }}" ]; then
            COV_ARGS="--cov --cov-report=xml --cov-fail-under=${{ inputs.coverage-threshold }}"
          fi
          case "${{ inputs.package-manager }}" in
            poetry) poetry run pytest ${COV_ARGS:+"$COV_ARGS"} ;;
            uv)     uv run pytest ${COV_ARGS:+"$COV_ARGS"} ;;
            *)      pytest ${COV_ARGS:+"$COV_ARGS"} ;;
          esac

      - name: Upload coverage
        if: inputs.run-coverage && matrix.python-version == inputs.python-version
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
